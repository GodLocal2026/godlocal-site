<!DOCTYPE html><html lang="ru"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>slonik52 🐘</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;--bg2:#111;--bg3:#1c1c1e;--bg4:#2c2c2e;
  --t:#fff;--t2:rgba(255,255,255,.6);--t3:rgba(255,255,255,.3);
  --sep:rgba(255,255,255,.1);
  --blue:#0a84ff;--green:#30d158;--red:#ff453a;--orange:#ff9f0a;--purple:#bf5af2;--teal:#64d2ff;
  --r:var(--red);--g:var(--green);--y:var(--orange);--p:var(--purple);
  --safe:#30d158;--warn:#ff9f0a;--danger:#ff453a;
}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;overflow:hidden}
/* ─── Layout ─── */
#app{display:flex;flex-direction:column;height:100%;height:100dvh}
#hdr{flex-shrink:0;padding:env(safe-area-inset-top,16px) 16px 0;padding-top:max(env(safe-area-inset-top),16px);background:rgba(0,0,0,.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--sep);z-index:10}
#hdr-top{display:flex;align-items:center;justify-content:space-between;padding:8px 0 10px}
.logo{font-size:18px;font-weight:700;letter-spacing:-.3px}
.logo span{color:var(--t2);font-weight:400;font-size:14px;margin-left:6px}
#solBtn{font-size:13px;font-weight:600;color:var(--t);background:var(--bg3);padding:5px 10px;border-radius:20px;border:none;cursor:pointer;display:flex;align-items:center;gap:4px}
/* ─── Segment / Pills ─── */
.seg{display:flex;gap:6px;overflow-x:auto;padding:0 0 10px;scrollbar-width:none}
.seg::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;border:none;cursor:pointer;background:var(--bg3);color:var(--t2);transition:all .15s}
.pill.on{background:var(--blue);color:#fff}
/* ─── Scroll area ─── */
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
.view{display:none;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 60px)}
.view.on{display:block}
/* ─── Tab bar ─── */
#tabs{flex-shrink:0;display:flex;background:rgba(0,0,0,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--sep);padding-bottom:env(safe-area-inset-bottom,0);z-index:10}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 6px;border:none;background:none;cursor:pointer;color:var(--t3);font-size:9px;font-weight:600;letter-spacing:.3px;transition:color .15s}
.tab svg{width:22px;height:22px;fill:currentColor}
.tab.on{color:var(--blue)}
/* ─── Cards ─── */
.feed{padding:0}
.card{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--sep);gap:12px;cursor:pointer;transition:background .1s;-webkit-user-select:none;user-select:none;active:background:var(--bg3)}
.card:active{background:var(--bg3)}
.tico{width:42px;height:42px;border-radius:12px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.tico img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.tico span{font-size:20px}
.cmeta{flex:1;min-width:0}
.csym{font-size:15px;font-weight:600;color:var(--t)}
.cname{font-size:12px;color:var(--t2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cright{text-align:right;flex-shrink:0}
.cprice{font-size:15px;font-weight:600;color:var(--t);font-variant-numeric:tabular-nums}
.cch{font-size:12px;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
.up{color:var(--green)}.dn{color:var(--red)}
/* ─── Section headers ─── */
.shdr{font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;padding:16px 16px 8px}
/* ─── Market grid ─── */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--sep)}
.mbox{background:var(--bg);padding:14px 16px}
.mbox-l{font-size:11px;color:var(--t2);margin-bottom:4px}
.mbox-v{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
/* ─── Rug badge ─── */
.rbdg{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700}
.rbdg.safe{background:rgba(48,209,88,.15);color:var(--green)}
.rbdg.warn{background:rgba(255,159,10,.15);color:var(--orange)}
.rbdg.danger{background:rgba(255,69,58,.15);color:var(--red)}
.agebdg{font-size:10px;color:var(--t3);font-variant-numeric:tabular-nums}
/* ─── Action sheet (modal) ─── */
#ov{position:fixed;inset:0;z-index:100;pointer-events:none}
#ov.open{pointer-events:all}
#ovBg{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .25s}
#ov.open #ovBg{background:rgba(0,0,0,.55)}
#sheet{position:absolute;left:0;right:0;bottom:0;background:var(--bg2);border-radius:20px 20px 0 0;padding:0 0 calc(env(safe-area-inset-bottom,0px)+8px);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1);max-height:90vh;overflow-y:auto}
#ov.open #sheet{transform:none}
.sdrag{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:10px auto 0}
.shdr2{padding:14px 20px 4px;font-size:17px;font-weight:700}
.sprice{padding:0 20px 16px;font-size:13px;color:var(--t2)}
.sseg{display:flex;background:var(--bg3);border-radius:10px;margin:0 16px 16px;padding:2px}
.sseg-btn{flex:1;padding:7px;border:none;background:none;color:var(--t2);font-size:14px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .2s}
.sseg-btn.on{background:#fff;color:#000}
/* ─── Amount pills ─── */
.aprw{display:flex;gap:8px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none}
.aprw::-webkit-scrollbar{display:none}
.ap{flex-shrink:0;padding:8px 14px;border-radius:10px;background:var(--bg3);border:none;color:var(--t2);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.ap.on{background:var(--blue);color:#fff}
.ainp{width:100%;padding:12px 16px;background:var(--bg3);border:none;border-radius:12px;color:var(--t);font-size:16px;font-family:inherit;margin:0 16px 14px;width:calc(100% - 32px)}
.ainp:focus{outline:none;background:var(--bg4)}
.slrow{display:flex;gap:8px;padding:0 16px 16px;overflow-x:auto;scrollbar-width:none}
.slrow::-webkit-scrollbar{display:none}
.slbtn{flex-shrink:0;padding:8px 12px;border-radius:10px;background:var(--bg3);border:none;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer}
.slbtn.on{background:var(--orange);color:#fff}
.qbox{margin:0 16px 14px;padding:12px;background:var(--bg3);border-radius:12px;font-size:13px;color:var(--t2);min-height:36px}
.exbtn{display:block;width:calc(100% - 32px);margin:0 16px 8px;padding:15px;border:none;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;letter-spacing:-.2px}
.exbtn.buy{background:var(--green);color:#000}
.exbtn.sell{background:var(--red);color:#fff}
.maddr{display:flex;align-items:center;gap:8px;padding:0 16px 16px}
.maddr-txt{font-size:12px;color:var(--t3);font-family:monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cpybtn{padding:5px 12px;background:var(--bg3);border:none;border-radius:8px;color:var(--t2);font-size:12px;cursor:pointer}
/* ─── AI chat ─── */
#aiMs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.bbl{padding:12px 14px;border-radius:16px;font-size:14px;line-height:1.5;max-width:88%;word-break:break-word}
.bbl a{color:var(--blue);text-decoration:none}
.bbl.us{background:var(--blue);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.bbl.ai{background:var(--bg3);color:var(--t);align-self:flex-start;border-bottom-left-radius:4px}
.bbl.ai details{margin-top:8px}
.bbl.ai summary{font-size:12px;color:var(--t2);cursor:pointer;user-select:none}
#aiIn{flex-shrink:0;padding:8px 16px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));background:rgba(0,0,0,.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--sep)}
.qpills{display:flex;gap:6px;overflow-x:auto;padding:0 0 8px;scrollbar-width:none}
.qpills::-webkit-scrollbar{display:none}
.qp{flex-shrink:0;padding:6px 12px;border-radius:16px;background:var(--bg3);border:none;color:var(--t2);font-size:13px;cursor:pointer;font-family:inherit}
.qp:active{background:var(--bg4)}
.inrow{display:flex;gap:8px;align-items:flex-end}
#aiI{flex:1;background:var(--bg3);border:none;border-radius:12px;color:var(--t);font-size:15px;padding:10px 14px;font-family:inherit;resize:none;height:40px;max-height:80px;line-height:1.4}
#aiI:focus{outline:none}
.sndbtn{width:36px;height:36px;border-radius:50%;background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:2px}
.sndbtn svg{width:18px;height:18px;fill:#fff}
/* ─── AI analysis card ─── */
.air{display:flex;flex-direction:column;gap:6px}
.verdict{font-size:15px;font-weight:700;padding:8px 12px;border-radius:12px;text-align:center;margin-bottom:4px}
.verdict.bull{background:rgba(48,209,88,.15);color:var(--green)}
.verdict.bear{background:rgba(255,69,58,.15);color:var(--red)}
.verdict.neut{background:rgba(255,159,10,.12);color:var(--orange)}
.arow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--sep);font-size:13px}
.arow:last-of-type{border:none}
.albl{color:var(--t2)}
.aval{font-weight:600}
.alinks{display:flex;gap:10px;padding-top:6px;flex-wrap:wrap}
.alinks a{font-size:13px;color:var(--blue);text-decoration:none}
/* ─── Live feed ─── */
.livehdr{display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(255,69,58,.06);border-bottom:1px solid rgba(255,69,58,.15)}
.lhd-txt{font-size:12px;font-weight:700;color:var(--red);flex:1}
.lhd-cnt{background:rgba(255,69,58,.2);color:var(--red);font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px}
.lhd-cls{background:none;border:none;color:var(--t3);font-size:16px;cursor:pointer;padding:0 4px}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.3}}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulseDot 1.4s ease-in-out infinite;flex-shrink:0}
.ldot.ok{background:var(--green)}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.lcard{display:flex;align-items:center;padding:13px 16px;gap:12px;border-bottom:1px solid var(--sep);animation:slideIn .2s ease both;cursor:pointer;-webkit-user-select:none}
.lcard:active{background:var(--bg3)}
.lbadge{background:rgba(255,69,58,.15);color:var(--red);font-size:9px;font-weight:800;padding:2px 6px;border-radius:6px;letter-spacing:.3px}
/* ─── Sniper ─── */
.snform{padding:16px}
.snlbl{font-size:12px;color:var(--t2);margin-bottom:6px;font-weight:600}
.sninp{width:100%;padding:12px 14px;background:var(--bg3);border:none;border-radius:12px;color:var(--t);font-size:15px;font-family:inherit;margin-bottom:10px}
.sninp:focus{outline:none}
.snbtn{width:100%;padding:14px;background:var(--blue);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.snitem{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--sep);gap:10px}
.sni-addr{font-size:12px;font-family:monospace;color:var(--t2);flex:1}
.sni-sol{font-size:13px;font-weight:700;color:var(--orange)}
.sni-del{width:28px;height:28px;border-radius:50%;background:rgba(255,69,58,.15);border:none;cursor:pointer;color:var(--red);font-size:14px;display:flex;align-items:center;justify-content:center}
/* ─── Wallet ─── */
.wsetup{padding:40px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
.wsetup-ico{font-size:48px}
.wsetup-ttl{font-size:20px;font-weight:700}
.wsetup-sub{font-size:14px;color:var(--t2);line-height:1.5}
.wbtn{width:100%;padding:14px;border-radius:14px;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.wbtn.ph{background:var(--purple);color:#fff}
.wbtn.mn{background:var(--bg3);color:var(--t)}
.waddr-row{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--sep)}
.waddr-txt{font-size:13px;font-family:monospace;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wbal-box{padding:24px 16px;text-align:center}
.wbal-sol{font-size:36px;font-weight:700;font-variant-numeric:tabular-nums}
.wbal-usd{font-size:16px;color:var(--t2);margin-top:4px}
.wdis{padding:14px 16px;border-top:1px solid var(--sep)}
.wdis-btn{width:100%;padding:13px;background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.2);border-radius:12px;color:var(--red);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
/* ─── News ─── */
.ncard{padding:14px 16px;border-bottom:1px solid var(--sep);cursor:pointer;-webkit-user-select:none}
.ncard:active{background:var(--bg3)}
.ntitle{font-size:15px;font-weight:600;line-height:1.35;margin-bottom:6px}
.nmeta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2)}
.ntag{background:var(--bg3);padding:2px 7px;border-radius:6px;font-size:10px;font-weight:600}
.nbull{background:rgba(48,209,88,.12);color:var(--green)}
.nbear{background:rgba(255,69,58,.12);color:var(--red)}
/* ─── Trend list ─── */
.trow{display:flex;align-items:center;padding:12px 16px;gap:10px;border-bottom:1px solid var(--sep);cursor:pointer;-webkit-user-select:none}
.trow:active{background:var(--bg3)}
.trank{font-size:13px;font-weight:800;color:var(--t3);width:20px;text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums}
.tname{flex:1;font-size:15px;font-weight:600}
.tsym{font-size:12px;color:var(--t2)}
/* ─── Spinner ─── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:18px;height:18px;border:2px solid var(--sep);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
.ldg{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px 16px;color:var(--t2);font-size:14px}
/* ─── Toast ─── */
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:rgba(255,255,255,.15);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* ─── Create token button ─── */
#createBtn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;background:linear-gradient(135deg,rgba(255,159,10,.25),rgba(255,69,58,.2));border:1px solid rgba(255,159,10,.4);color:var(--orange);font-size:12px;font-weight:700;text-decoration:none;cursor:pointer;flex-shrink:0}
#createBtn:active{opacity:.7}
/* ─── Market coin image ─── */
.timg{width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.timg img{width:34px;height:34px;border-radius:50%;object-fit:cover}
/* ─── Typing indicator ─── */
.typ{background:var(--bg3);border-radius:16px;border-bottom-left-radius:4px;padding:12px 16px;align-self:flex-start;display:flex;gap:4px;align-items:center}
.typ span{width:6px;height:6px;border-radius:50%;background:var(--t2);animation:typb 1.2s ease-in-out infinite}
.typ span:nth-child(2){animation-delay:.2s}.typ span:nth-child(3){animation-delay:.4s}
@keyframes typb{0%,60%,100%{transform:none;opacity:.4}30%{transform:translateY(-4px);opacity:1}}
</style>
<div id="app">
<!-- ─── Header ─── -->
<div id="hdr">
  <div id="hdr-top">
    <div class="logo">🐘 slonik52 <span id="tickEl"></span></div>
    <div style="display:flex;align-items:center;gap:8px">
      <a href="https://pump.fun/create" target="_blank" id="createBtn" title="Создать токен на pump.fun">🪙 Создать</a>
      <button id="solBtn" onclick="go('market')">SOL …</button>
    </div>
  </div>
  <div class="seg" id="segTop" style="display:none">
    <button class="pill on" id="pScan" onclick="chip('scan')">Скан</button>
    <button class="pill" id="pPump" onclick="chip('pump')">pump.fun</button>
    <button class="pill" id="pHot" onclick="chip('hot')">🔥 Горячие</button>
    <button class="pill" id="pSnipe" onclick="chip('snipe')">Снайпер</button>
  </div>
</div>

<!-- ─── Main scroll ─── -->
<div id="main">

  <!-- SCAN -->
  <div class="view on" id="vScan">
    <div class="livehdr" id="liveBar" style="display:none">
      <div class="ldot" id="lbDot"></div>
      <span class="lhd-txt" id="lbStatus">Подключение…</span>
      <span class="lhd-cnt" id="lbCnt">0</span>
      <button class="lhd-cls" onclick="clearLive()">✕</button>
    </div>
    <div id="liveFeed"></div>
    <div class="shdr" id="scanHdr">Новые токены</div>
    <div id="fScan"><div class="ldg"><div class="spin"></div> Загрузка…</div></div>
  </div>

  <!-- NEWS — 3 sub-tabs -->
  <div class="view" id="vNews">
    <div class="seg" style="padding:12px 16px 0">
      <button class="pill on" id="nCMC" onclick="newsTab('cmc')">📊 CMC</button>
      <button class="pill" id="nCG" onclick="newsTab('cg')">🦎 CoinGecko</button>
      <button class="pill" id="nPump" onclick="newsTab('pump')">🔥 Pump</button>
    </div>
    <div id="fNews"><div class="ldg"><div class="spin"></div> Загрузка…</div></div>
  </div>

  <!-- MARKET — top 100 -->
  <div class="view" id="vMarket">
    <div class="mgrid">
      <div class="mbox"><div class="mbox-l">SOL ЦЕНА</div><div class="mbox-v" id="mSP">—</div></div>
      <div class="mbox"><div class="mbox-l">24H</div><div class="mbox-v" id="mSC">—</div></div>
      <div class="mbox"><div class="mbox-l">ОБЪЁМ 24H</div><div class="mbox-v" id="mSV">—</div></div>
      <div class="mbox"><div class="mbox-l">РЫН. КАП.</div><div class="mbox-v" id="mSM">—</div></div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 16px 0">
      <div class="shdr" style="padding:10px 0 6px" id="mktHdr">Топ 100 по капитализации</div>
      <div id="mktPg" style="display:flex;gap:6px">
        <button class="pill" id="pgBtn1" onclick="loadMarket(1)" style="min-width:36px">1</button>
        <button class="pill on" id="pgBtn2" style="display:none;min-width:36px" onclick="loadMarket(2)">2</button>
      </div>
    </div>
    <div id="trendEl"><div class="ldg"><div class="spin"></div></div></div>
  </div>

  <!-- WALLET -->
  <div class="view" id="vWallet">
    <div id="wSetEl" class="wsetup">
      <div class="wsetup-ico">👛</div>
      <div class="wsetup-ttl">Кошелёк</div>
      <div class="wsetup-sub">Подключи Phantom или введи адрес для просмотра баланса</div>
      <button class="wbtn ph" onclick="connectPhantom()">⚡ Phantom</button>
      <div style="display:flex;gap:8px;width:100%;margin-top:4px">
        <input class="sninp" style="margin:0;flex:1" id="wPubI" placeholder="Адрес кошелька…" value="">
        <button class="wbtn mn" style="width:auto;padding:13px 16px" onclick="saveWallet()">OK</button>
      </div>
    </div>
    <div id="wHdEl" style="display:none">
      <div class="waddr-row">
        <span class="waddr-txt" id="wAdEl"></span>
        <button class="cpybtn" onclick="cpAddr()">Копировать</button>
      </div>
      <div class="wbal-box">
        <div class="wbal-sol" id="wSlEl">— SOL</div>
        <div class="wbal-usd" id="wUEl">≈ $—</div>

<script>
const DEX='https://api.dexscreener.com',PUMP='https://frontend-api.pump.fun';
const JUP='https://quote-api.jup.ag/v6',CG='https://api.coingecko.com/api/v3';
const WSOL='So11111111111111111111111111111111111111112';
const CMC_NEWS='https://api.coinmarketcap.com/content/v3/news?start=0&limit=20';
const SKIP=new Set(['SOL','WSOL','USDC','USDT','ETH','WETH','BTC','WBTC','RAY','BONK']);
let solUsd=0,activeTab='scan',activeChip='scan',activeNewsTab='cmc';
let mMint='',mSym='',mMode='buy',mSlip=1,solAmt=0.1,sPct=100,qTmr=null;
let mTwitterUrl='',mPumpUrl='';
let snipes=JSON.parse(localStorage.getItem('s52sn')||'[]');
let wPub=localStorage.getItem('s52pub')||'';
let mktPage=1;
const G=id=>document.getElementById(id);
const fN=n=>{if(!n||isNaN(n))return'—';if(n>=1e12)return'$'+(n/1e12).toFixed(2)+'T';if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(1)+'K';return'$'+n.toFixed(0)};
const fP=n=>{if(!n||isNaN(n))return'—';if(n<0.000001)return'$'+n.toExponential(2);if(n<0.01)return'$'+n.toFixed(7);if(n<1)return'$'+n.toFixed(4);return'$'+n.toFixed(2)};
const fA=ms=>{const s=Math.floor(ms/1000);if(s<60)return s+'s';const m=Math.floor(s/60);if(m<60)return m+'m';const h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d'};
function toast(msg){const e=G('toastEl');e.textContent=msg;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2200)}
function rugInfo(p){
  const lp=parseFloat(p.liquidity?.usd||0);
  const tx=p.txns?.h1||{};const b=tx.buys||0,s=tx.sells||0,tot=b+s;
  const age=Date.now()-(p.pairCreatedAt||0);
  let score=0;
  if(lp>5000)score+=25;if(lp>20000)score+=10;
  if(age>3600000)score+=20;if(age>86400000)score+=15;
  if(tot>0){const r=b/tot;if(r>0.4&&r<0.85)score+=25;else if(r<0.25)score-=10;}
  if(p.volume?.h1>200)score+=15;
  score=Math.max(0,Math.min(100,score));
  const cls=score>=70?'safe':score>=40?'warn':'danger';
  const lbl=score>=70?'✅':score>=40?'⚠️':'🔴';
  return{score,cls,lbl};}

function buildCard(p){
  let mint=p.baseToken?.address||'',sym=p.baseToken?.symbol||'???';
  if(SKIP.has(sym.toUpperCase())){
    const qs=p.quoteToken?.symbol||'';
    if(!SKIP.has(qs.toUpperCase())){mint=p.quoteToken?.address||mint;sym=qs||sym;}
    else return null;}
  const pr=parseFloat(p.priceUsd||0),mc=parseFloat(p.fdv||p.marketCap||0);
  const liq=parseFloat(p.liquidity?.usd||0);
  const ch1=parseFloat(p.priceChange?.h1||0);
  const age=p.pairCreatedAt?fA(Date.now()-p.pairCreatedAt):'?';
  const {score,cls,lbl}=rugInfo(p);
  const twUrl=p.info?.socials?.find(s=>s.type==='twitter')?.url||'';
  const pumpUrl=mint?`https://pump.fun/coin/${mint}`:'';
  const pimg=p.info?.imageUrl?`<img src="${p.info.imageUrl}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt="" style="width:42px;height:42px;border-radius:12px;object-fit:cover"><span style="display:none;font-size:20px;width:42px;height:42px;align-items:center;justify-content:center">🐘</span>`:`<span style="font-size:20px">🐘</span>`;
  const symSafe=sym.replace(/'/g,"\'").replace(/"/g,'&quot;');
  const twSafe=(twUrl||'').replace(/'/g,'');
  const pumpSafe=(pumpUrl||'').replace(/'/g,'');
  return`<div class="card" onclick="openModal('${mint}','${symSafe}',${pr},'${twSafe}','${pumpSafe}')">
  <div class="tico">${pimg}</div>
  <div class="cmeta">
    <div class="csym">${sym} <span class="agebdg">${age}</span></div>
    <div class="cname">${fN(mc)} mcap · <span style="color:var(--teal)">${fN(liq)} liq</span> · <span class="rbdg ${cls}">${lbl} ${score}%</span></div>
  </div>
  <div class="cright">
    <div class="cprice">${fP(pr)}</div>
    <div class="cch ${ch1>=0?'up':'dn'}">${ch1>=0?'+':''}${ch1.toFixed(1)}%</div>
  </div>
</div>`;}

async function fetchPairsForMints(mints){
  const r=await fetch(DEX+'/tokens/v1/solana/'+mints.slice(0,30).join(','));

  const d=await r.json();
  return(d.pairs||[]).filter(p=>p.chainId==='solana');}

async function loadScan(full=true){
  const el=G('fScan');
  if(full){el.innerHTML='<div class="ldg"><div class="spin"></div> Загрузка…</div>';}
  try{
    G('tickEl').textContent='';
    const [r1,r2]=await Promise.allSettled([
      fetch(DEX+'/token-boosts/latest/v1'),
      fetch(DEX+'/token-profiles/latest/v1')]);
    let mints=[];
    const parseR=async r=>{if(r.status==='fulfilled'&&r.value.ok){const d=await r.value.json();return(Array.isArray(d)?d:d.tokenProfiles||[]).map(x=>x.tokenAddress||x.address).filter(Boolean);}return[];};
    const [m1,m2]=await Promise.all([parseR(r1),parseR(r2)]);
    mints=[...new Set([...m1,...m2])].slice(0,30);
    let pairs=[];
    if(mints.length)try{pairs=await fetchPairsForMints(mints);}catch(e){}
    if(!pairs.length){
      const rs=await fetch(DEX+'/latest/dex/search?q=solana&rankBy=trendingScoreH6');
      if(rs.ok){const ds=await rs.json();pairs=(ds.pairs||[]).filter(p=>p.chainId==='solana');}
    }
    if(!pairs.length)throw new Error('Нет данных');
    pairs.sort((a,b)=>(b.volume?.h1||0)-(a.volume?.h1||0));
    const shdr=G('scanHdr');if(shdr)shdr.textContent=`Новые токены (${pairs.length})`;
    const html=pairs.slice(0,40).map(p=>buildCard(p)).filter(Boolean).join('');
    el.innerHTML=html||'<div class="ldg">Нет токенов</div>';
    G('tickEl').textContent=new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  }catch(e){G('tickEl').textContent='';if(full)el.innerHTML=`<div class="ldg">⚠️ ${e.message}</div>`;}}

function agentBurry(p){
  const liq=parseFloat(p.liquidity?.usd||0);
  const tx=p.txns?.h1||{};const b=tx.buys||0,s=tx.sells||0,tot=b+s;
  const age=Date.now()-(p.pairCreatedAt||0);
  let sc=0,notes=[];
  if(liq<2000){sc-=3;notes.push('⚠️ Ликвидность критически низкая: '+fN(liq));}
  else if(liq<8000){sc-=1;notes.push('⚠️ Слабая ликвидность: '+fN(liq));}
  else{sc+=2;notes.push('✅ Ликвидность: '+fN(liq));}
  if(age<1800000){sc-=2;notes.push('⚠️ Возраст < 30 мин');}
  else{sc+=1;notes.push('✅ Возраст: '+fA(age));}
  if(tot>0&&s/tot>0.7){sc-=2;notes.push('🔴 Продажи '+Math.round(s/tot*100)+'%');}
  else if(tot>0&&b/tot>0.55){sc+=1;notes.push('✅ Покупки '+Math.round(b/tot*100)+'%');}
  const v=sc>=2?'SAFE':sc>=-1?'NEUTRAL':'РИСК';
  const c=sc>=2?'var(--green)':sc>=-1?'var(--orange)':'var(--red)';
  return{name:'🔒 Rug Detective',sc,v,c,notes};}

function agentDruck(p){
  const c1=parseFloat(p.priceChange?.h1||0),c6=parseFloat(p.priceChange?.h6||0),c24=parseFloat(p.priceChange?.h24||0);
  const v1=p.volume?.h1||0,v6=p.volume?.h6||0;
  let sc=0,notes=[];
  if(v6>0&&v1>v6/6*1.5){sc+=2;notes.push('🚀 Объём ускоряется');}
  else if(v1>100){sc+=1;notes.push('📊 Объём 1H: '+fN(v1));}
  else{sc-=1;notes.push('📉 Слабый объём');}
  if(c1>5&&c6>0&&c24>0){sc+=3;notes.push('🔥 Тренд вверх на всех ТФ');}
  else if(c1>3&&c6>0){sc+=2;notes.push('📈 Тренд 1H +'+c1.toFixed(1)+'%');}
  else if(c1<-10&&c6<-5){sc-=2;notes.push('💥 Тренд вниз');}
  const v=sc>=3?'STRONG BULL':sc>=1?'BULL':sc>=-1?'NEUTRAL':'BEAR';
  const c=sc>=3?'var(--green)':sc>=1?'#9dff9d':sc>=-1?'var(--orange)':'var(--red)';
  return{name:'📈 Momentum',sc,v,c,notes};}

function agentMunger(p){
  const mc=parseFloat(p.fdv||p.marketCap||0),liq=parseFloat(p.liquidity?.usd||0);
  const v24=p.volume?.h24||0;
  let sc=0,notes=[];
  if(liq>0){const pl=mc/liq;if(pl<10){sc+=2;notes.push('✅ Mcap/Liq='+pl.toFixed(1)+'x');}
  else if(pl<50){sc+=1;notes.push('📊 Mcap/Liq='+pl.toFixed(1)+'x');}
  else{sc-=1;notes.push('⚠️ Mcap/Liq='+pl.toFixed(1)+'x перегрет');}}

  else if(vm>0.1){sc+=1;}else{sc-=1;notes.push('💤 Низкая активность');}}
  if(mc>0&&mc<500000){sc+=1;notes.push('✅ Mcap<$500K — потенциал');}
  const v=sc>=2?'UNDERVALUED':sc>=-1?'FAIR':'OVERVALUED';
  const c=sc>=2?'var(--green)':sc>=-1?'var(--orange)':'var(--red)';
  return{name:'🏦 Value',sc,v,c,notes};}

function agentSentiment(p){
  const tx=p.txns?.h1||{};const b=tx.buys||0,s=tx.sells||0,tot=b+s;
  let sc=0,notes=[];
  if(tot>0){const br=b/tot;
  if(br>0.65){sc+=2;notes.push('🟢 B/S='+Math.round(br*100)+'% ('+b+'B/'+s+'S)');}

  if(tot>100){sc+=1;notes.push('✅ '+tot+' txn/час');}
  else{sc-=1;notes.push('💤 '+tot+' txn/час');}
  const v=sc>=2?'BULLISH':sc>=-1?'NEUTRAL':'BEARISH';
  const c=sc>=2?'var(--green)':sc>=-1?'var(--orange)':'var(--red)';

async function execSwap(){
  const ph=await getPhantom();
  if(!ph){
    // fallback — open Jupiter Web
    window.open(`https://jup.ag/swap/SOL-${mMint}`,'_blank');return;}

  const eb=G('exBtn');
  const origTxt=eb.textContent;
  eb.disabled=true;
  eb.innerHTML='<span style="display:inline-flex;align-items:center;gap:6px"><div class="spin" style="width:14px;height:14px;border-width:2px;display:inline-block"></div> Подготовка…</span>';

  try{
    // 1) Get fresh quote
    const lam=Math.floor((parseFloat(G('mSA').value)||0.1)*1e9);
    const slip=mSlip*100;
    const qUrl=`${JUP}/quote?inputMint=${WSOL}&outputMint=${mMint}&amount=${lam}&slippageBps=${slip}`;
    const qRes=await fetch(qUrl);
    if(!qRes.ok)throw new Error('Нет квоты');
    const quote=await qRes.json();

    // 2) Build swap transaction via Jupiter swap API
    eb.innerHTML='<span style="display:inline-flex;align-items:center;gap:6px"><div class="spin" style="width:14px;height:14px;border-width:2px;display:inline-block"></div> Строю транзакцию…</span>';
    const userPk=ph.publicKey.toString();
    const swapRes=await fetch('https://quote-api.jup.ag/v6/swap',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        quoteResponse:quote,
        userPublicKey:userPk,
        wrapAndUnwrapSol:true,
        dynamicComputeUnitLimit:true,
        prioritizationFeeLamports:'auto'
      })});
    if(!swapRes.ok){const err=await swapRes.text();throw new Error('Jupiter: '+err.slice(0,80));}
    const swapData=await swapRes.json();
    const txBase64=swapData.swapTransaction;
    if(!txBase64)throw new Error('Транзакция не получена');

    // 3) Decode to Uint8Array and send to Phantom
    eb.innerHTML='<span style="display:inline-flex;align-items:center;gap:6px"><div class="spin" style="width:14px;height:14px;border-width:2px;display:inline-block"></div> Подпиши в Phantom…</span>';
    const txBytes=Uint8Array.from(atob(txBase64),c=>c.charCodeAt(0));

    // signAndSendTransaction — works on both mobile (Phantom in-app browser) and desktop
    let txSig;
    if(ph.signAndSendTransaction){
      const result=await ph.signAndSendTransaction({message:txBytes},{skipPreflight:false,maxRetries:2});
      txSig=result.signature||result;
    } else if(ph.signTransaction){
      // older Phantom API fallback
      const signedTx=await ph.signTransaction({data:txBytes});
      const sendRes=await fetch('https://api.mainnet-beta.solana.com',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({jsonrpc:'2.0',id:1,method:'sendTransaction',
          params:[btoa(String.fromCharCode(...signedTx.serialize())),{encoding:'base64',skipPreflight:false}]})});
      const sendJson=await sendRes.json();
      if(sendJson.error)throw new Error(sendJson.error.message||'RPC error');
      txSig=sendJson.result;
    } else throw new Error('Phantom не поддерживает подпись');

    // 4) Success
    eb.disabled=false;eb.textContent=origTxt;
    closeModal();
    const solscan=`https://solscan.io/tx/${txSig}`;
    toast('✅ Своп отправлен!');
    // Show success in AI tab
    go('ai');
    setTimeout(()=>{addMsg(`<div class="air">
<div class="verdict bull">✅ Куплено $${mSym}</div>
<div style="font-size:13px;color:var(--t2);line-height:1.7;margin-top:4px">
  Транзакция отправлена в сеть.<br>
  <a href="${solscan}" target="_blank" style="color:var(--blue);text-decoration:none">🔗 Смотреть на Solscan</a>
</div>
<div style="font-size:11px;color:var(--t3);margin-top:6px;word-break:break-all">${txSig.slice(0,20)}…</div>
</div>`,'ai');},100);
    loadWallet(); // refresh balance

  }catch(err){
    eb.disabled=false;eb.textContent=origTxt;
    const msg=err.message||String(err);
    if(msg.includes('User rejected')||msg.includes('отклонено')||msg.includes('cancel')){
      toast('Транзакция отклонена');
    } else {

      // Fallback to Jupiter Web
      setTimeout(()=>{
        if(confirm('Прямой своп не удался. Открыть Jupiter?')){
          window.open(`https://jup.ag/swap/SOL-${mMint}`,'_blank');}
      },300);}}}

  ws.onmessage=e=>{try{const d=JSON.parse(e.data);if(d.txType==='create'||d.type==='token_create'||(d.mint&&d.symbol))addLiveToken(d);}catch(err){}};
  ws.onclose=()=>{wsStatus(false,'Переподключение…');wsIdx++;const dl=Math.min(3000+wsRetry*2000,15000);wsRetry++;setTimeout(initWS,dl);};
  ws.onerror=()=>{try{ws.close();}catch(e){}};
  }catch(e){wsIdx++;wsRetry++;setTimeout(initWS,5000);}}
function addLiveToken(d){
  const mint=(d.mint||d.tokenAddress||'').trim();if(!mint||mint.length<20)return;
  const sym=((d.symbol||'???')+'').toUpperCase().slice(0,10);
  const name=(d.name||sym).slice(0,24);
  const sol=parseFloat(d.solAmount||d.initialBuy||0);
  const twCreator=d.twitter||d.creatorTwitter||'';
  const pumpUrl=`https://pump.fun/coin/${mint}`;
  const symSafe=sym.replace(/'/g,"\'");
  const ts=Date.now();const tid='lt'+ts;
  const card=document.createElement('div');card.className='lcard';
  card.onclick=()=>openModal(mint,symSafe,0,twCreator?'https://twitter.com/'+twCreator.replace('@',''):'',pumpUrl);
  card.innerHTML=`<div class="tico"><span style="font-size:20px">🔥</span></div>
<div class="cmeta"><div class="csym">${name} <span class="lbadge">НОВЫЙ</span></div>
<div class="cname">${mint.slice(0,6)}…${mint.slice(-4)}${sol>0?' · +'+sol.toFixed(3)+' SOL':''}</div></div>
<div class="cright"><div class="cprice" style="font-size:11px;color:var(--t2)" id="${tid}">0s</div><div style="font-size:10px;color:var(--orange)">pump.fun</div></div>`;
  const tmr=setInterval(()=>{const e=G(tid);if(!e){clearInterval(tmr);return;}const s=Math.floor((Date.now()-ts)/1000);e.textContent=s<60?s+'s':Math.floor(s/60)+'m';},1000);
  liveTimers.push(tmr);
  const feed=G('liveFeed');if(feed){feed.insertBefore(card,feed.firstChild);while(feed.children.length>15)feed.removeChild(feed.lastChild);}
  liveCnt++;const cnt=G('lbCnt');if(cnt)cnt.textContent=liveCnt;
  const bar=G('liveBar');if(bar){bar.style.background='rgba(255,69,58,.12)';setTimeout(()=>{bar.style.background='';},350);}}
function clearLive(){liveCnt=0;const f=G('liveFeed');if(f)f.innerHTML='';const c=G('lbCnt');if(c)c.textContent='0';liveTimers.forEach(t=>clearInterval(t));liveTimers=[];}

window.addEventListener('DOMContentLoaded',()=>{
  fetchSol();setInterval(fetchSol,30000);
  initWallet();if(wPub)loadWallet();
  if(G('wPubI'))G('wPubI').value=wPub||'';
  go('scan');loadScan();setInterval(()=>{if(activeTab==='scan')loadScan(false);},40000);
  setTimeout(initWS,1000);
  if(!wPub){const ph=window.solana||window.phantom?.solana;
  if(ph?.isPhantom&&ph.isConnected){ph.connect({onlyIfTrusted:true}).then(r=>{wPub=r.publicKey.toString();localStorage.setItem('s52pub',wPub);initWallet();}).catch(()=>{});}}});
